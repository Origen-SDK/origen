name: Origen Core Regression Tests
on: [push, pull_request]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        ruby-version: [2.6, 2.7, 3.0.4, 3.1, 3.3.1, 3.4.2, 4.0.0]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler: '2.4.22'
    - name: Update Env
      run: echo "ACTIONS_ALLOW_UNSECURE_COMMANDS=true" >> $GITHUB_ENV
    - name: Remove Gemfile.lock
      run: rm Gemfile.lock
    - name: Install dependencies
      run: bundle install  
      
    # Ruby 3+ requires building the gem locally before install
    - name: Build and Install Origen Gem (Ruby 3+)
      if: matrix.ruby-version != '2.6' && matrix.ruby-version != '2.7'
      run: gem build origen.gemspec --output origen.gem && gem install origen.gem

    # Ruby 2.x can install origen directly
    - name: Gem Install Origen (Ruby 2.x)
      if: matrix.ruby-version == '2.6' || matrix.ruby-version == '2.7'
      run: gem install origen 
      
    - name: Setup Dependencies
      run: origen -v
    - name: Run Origen Lint
      run: origen lint --no-correct  
    - name: Set Origen to debug mode
      run: origen m debug
    - name: Run Spec tests
      run: origen test -c
    - name: Coveralls GitHub Action
      uses: coverallsapp/github-action@v2.3.4
      with:
        flag-name: ${{ join(matrix.*, '-') }}
        parallel: true
        
    # Temporarily disable web compile check in windows
    - name: Verify Building website
      if: matrix.os == 'ubuntu-latest'
      run: origen web compile --no-serve
      
  finish:
    needs: build
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
    - name: Coveralls Finished
      uses: coverallsapp/github-action@v2.3.4
      with:
        parallel-finished: true
